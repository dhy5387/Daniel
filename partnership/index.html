<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 560px;
            padding: 48px 40px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 4px;
        }

        .tagline {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 36px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        label .req { color: #ef4444; margin-left: 2px; }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a2e;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
            background: #fff;
        }

        textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover { background: #4338ca; }
        button[type="submit"]:active { transform: scale(0.99); }
        button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

        .success {
            display: none;
            text-align: center;
            padding: 32px 0;
        }

        .success-icon { font-size: 48px; margin-bottom: 16px; }

        .success h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .error-msg {
            display: none;
            font-size: 13px;
            color: #ef4444;
            margin-top: 10px;
            text-align: center;
        }

        .comments-section {
            width: 100%;
            max-width: 560px;
            margin-top: 32px;
        }

        .comments-label {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Partnership</div>
        <div class="tagline">제휴 및 협력 문의</div>

        <h1>함께 성장해요 👋</h1>
        <p class="subtitle">제휴, 광고, 협력 제안 등 무엇이든 편하게 남겨주세요.<br>영업일 기준 2일 내 답변드립니다.</p>

        <form id="partner-form" action="https://formspree.io/f/mzdkeag" method="POST">
            <div class="row">
                <div class="field">
                    <label for="name">담당자 이름 <span class="req">*</span></label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="field">
                    <label for="company">회사명 <span class="req">*</span></label>
                    <input type="text" id="company" name="company" placeholder="(주)회사명" required>
                </div>
            </div>

            <div class="field">
                <label for="email">이메일 <span class="req">*</span></label>
                <input type="email" id="email" name="email" placeholder="example@company.com" required>
            </div>

            <div class="row">
                <div class="field">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
                </div>
                <div class="field">
                    <label for="type">제휴 유형</label>
                    <select id="type" name="type">
                        <option value="">선택 (선택사항)</option>
                        <option value="광고/마케팅">광고 / 마케팅</option>
                        <option value="콘텐츠 제휴">콘텐츠 제휴</option>
                        <option value="기술 협력">기술 협력</option>
                        <option value="투자/IR">투자 / IR</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="message">문의 내용 <span class="req">*</span></label>
                <textarea id="message" name="message" placeholder="제휴 목적 및 구체적인 내용을 자유롭게 작성해주세요." required></textarea>
            </div>

            <button type="submit" id="submit-btn">문의 보내기</button>
            <p class="error-msg" id="error-msg">전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</p>
        </form>

        <div class="success" id="success">
            <div class="success-icon">✅</div>
            <h2>문의가 접수되었습니다!</h2>
            <p>입력하신 이메일로 확인 메일을 발송했습니다.<br>영업일 기준 2일 내에 연락드리겠습니다.</p>
        </div>
    </div>

    <div class="comments-section">
        <div class="comments-label">댓글</div>
        <div id="disqus_thread"></div>
        <script>
            var disqus_config = function () {
                this.page.url = 'https://dhy5387.github.io/partnership-site/';
                this.page.identifier = 'partnership-site';
            };
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-q4sjfr8iwq.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script>
        const form = document.getElementById('partner-form');
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = '전송 중...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    form.style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    throw new Error('Server error');
                }
            } catch {
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '문의 보내기';
            }
        });
    </script>
</body>
</html>
